<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #f0f7ff; }
      .heart { fill: #e63946; }
      .medical { fill: #1d3557; }
      .accent { fill: #457b9d; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #1d3557; }
      .heart { fill: #ff6b7a; }
      .medical { fill: #f1faee; }
      .accent { fill: #a8dadc; }
    }
  </style>
  
  <!-- Background -->
  <rect class="background" width="180" height="180" rx="40" />
  
  <!-- Heart shape (representing Love) -->
  <g transform="translate(90, 90)">
    <!-- Left heart bump -->
    <circle class="heart" cx="-8" cy="-15" r="18" />
    <!-- Right heart bump -->
    <circle class="heart" cx="8" cy="-15" r="18" />
    <!-- Heart point -->
    <path class="heart" d="M -25 5 L 0 35 L 25 5 Q 25 -5 16 -12 Q 0 -25 -8 -15 Q -25 -5 -25 5 Z" />
  </g>
  
  <!-- Medical cross inside heart -->
  <g transform="translate(90, 85)">
    <!-- Horizontal bar of cross -->
    <rect class="medical" x="-12" y="-3" width="24" height="6" rx="2" />
    <!-- Vertical bar of cross -->
    <rect class="medical" x="-3" y="-12" width="6" height="24" rx="2" />
  </g>
  
  <!-- Accent circle around heart -->
  <circle class="accent" cx="90" cy="90" r="55" fill="none" stroke-width="2.5" />
  
  <!-- Brand text indicator (subtle) -->
  <text x="90" y="160" font-family="Arial, sans-serif" font-size="10" font-weight="bold" 
    class="medical" text-anchor="middle" letter-spacing="1">LOVEMEDIX</text>
</svg>
